name: CI

on:
    pull_request:
        branches:
            - main

env:
    NODE_VERSION: 24

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Setup Node.js
            uses: actions/setup-node@v3
            with:
                node-version: ${{ env.NODE_VERSION }}
                cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Build
            run: npm run build --if-present

          - name: Run ESLint
            run: npm run lint:check

    test:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Setup Node.js
            uses: actions/setup-node@v3
            with:
                node-version: ${{ env.NODE_VERSION }}
                cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Build
            run: npm run build --if-present

        - name: Run tests
            run: npm test
